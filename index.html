<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseAI — News & Markets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-pulse">Pulse</span><span class="logo-ai">AI</span>
      </div>
      <div class="ticker-tape" id="tickerTape">
        <div class="ticker-inner" id="tickerInner"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="api-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Configure API Keys</span>
      </div>
      <button class="btn-settings" id="btnSettings" title="Settings">⚙</button>
    </div>
  </header>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>API Configuration</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-note">Keys are stored locally in your browser. Never committed to GitHub.</p>
        <div class="field-group">
          <label>Gemini API Key</label>
          <input type="password" id="geminiKey" placeholder="AIza..." />
          <a href="https://aistudio.google.com/app/apikey" target="_blank" class="get-key-link">Get free key →</a>
        </div>
        <div class="field-group">
          <label>NewsAPI Key</label>
          <input type="password" id="newsKey" placeholder="your_newsapi_key" />
          <a href="https://newsapi.org/register" target="_blank" class="get-key-link">Get free key →</a>
        </div>
        <div class="field-group">
          <label>Alpha Vantage Key <span class="badge-free">FREE</span></label>
          <input type="password" id="stockKey" placeholder="your_alphavantage_key" />
          <a href="https://www.alphavantage.co/support/#api-key" target="_blank" class="get-key-link">Get free key →</a>
        </div>
        <button class="btn-save" id="saveKeys">Save & Apply</button>
      </div>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <main class="layout">
    <!-- LEFT: NEWS PANEL -->
    <section class="news-panel">
      <!-- Topic Filter Bar -->
      <div class="topic-bar">
        <button class="topic-btn active" data-topic="all">All</button>
        <button class="topic-btn" data-topic="technology">Tech</button>
        <button class="topic-btn" data-topic="business">Business</button>
        <button class="topic-btn" data-topic="politics">Politics</button>
        <button class="topic-btn" data-topic="science">Science</button>
        <button class="topic-btn" data-topic="health">Health</button>
        <button class="topic-btn" data-topic="sports">Sports</button>
        <button class="topic-btn" data-topic="world">World</button>
        <button class="btn-refresh-news" id="btnRefreshNews" title="Refresh News">↻ Refresh</button>
      </div>

      <!-- AI Ask Bar -->
      <div class="ai-ask-bar">
        <div class="ai-icon">✦</div>
        <input type="text" id="aiQuestion" placeholder="Ask Gemini about today's news… e.g. 'Summarize tech trends' or 'What's driving markets?'" />
        <button id="btnAskAI">Ask</button>
      </div>

      <!-- AI Response Box -->
      <div class="ai-response-box" id="aiResponseBox" style="display:none;">
        <div class="ai-response-header">
          <span class="ai-label">✦ Gemini</span>
          <button class="close-ai" id="closeAiBox">✕</button>
        </div>
        <div class="ai-response-text" id="aiResponseText"></div>
      </div>

      <!-- News Feed -->
      <div class="news-feed" id="newsFeed">
        <div class="loading-state" id="newsLoading">
          <div class="loading-orb"></div>
          <p>Loading today's news…</p>
        </div>
      </div>
    </section>

    <!-- RIGHT: STOCK PANEL -->
    <aside class="stock-panel">
      <div class="stock-panel-header">
        <h2 class="stock-title">Markets</h2>
        <div class="market-time" id="marketTime"></div>
      </div>

      <!-- Stock Search -->
      <div class="stock-search-wrap">
        <input type="text" id="stockSearch" placeholder="Search ticker… AAPL, TSLA, BTC" />
        <button id="btnStockSearch">+</button>
      </div>

      <!-- Favorites -->
      <div class="stock-section-label">⭐ Watchlist</div>
      <div class="stock-list" id="watchlist"></div>

      <!-- Popular -->
      <div class="stock-section-label">📈 Popular</div>
      <div class="stock-list" id="popularStocks"></div>

      <!-- AI Market Briefing -->
      <div class="market-briefing" id="marketBriefing">
        <div class="briefing-header">
          <span class="ai-label">✦ AI Market Brief</span>
          <button class="btn-refresh-brief" id="btnMarketBrief">Refresh</button>
        </div>
        <div class="briefing-text" id="briefingText">Click Refresh for an AI-powered market overview.</div>
      </div>
    </aside>
  </main>

  <script src="js/config.js"></script>
  <script src="js/news.js"></script>
  <script src="js/stocks.js"></script>
  <script src="js/gemini.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
